<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏦 Asta Alcolica — Rana Laurea</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F5F0E8; --brown:#3D2B1F; --gold:#C9973A; --gold-light:#E8C97A;
  --red:#8B2020; --green:#2D5A3D; --paper:#E8E0CC; --paper2:#DED5BC; --dark:#1A1410;
}
*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Courier Prime', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── HEADER ── */
.game-header {
  background: rgba(0,0,0,.4);
  border-bottom: 3px double var(--gold);
  padding: 16px 24px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(6px);
}
.back-btn {
  font-family: 'Special Elite', cursive; font-size: 11px; letter-spacing: 2px;
  padding: 7px 16px; border: 1.5px solid var(--gold); background: transparent;
  color: var(--gold); cursor: pointer; text-decoration: none; text-transform: uppercase;
  transition: all .2s; white-space: nowrap;
}
.back-btn:hover { background: var(--gold); color: var(--brown); }
.header-center { flex: 1; text-align: center; }
.game-header-num { font-family: 'Special Elite', cursive; font-size: 10px; letter-spacing: 3px; color: rgba(201,151,58,.5); text-transform: uppercase; }
.game-header-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--gold); }

/* ── BG PATTERN ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(201,151,58,.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(45,90,61,.05) 0%, transparent 55%),
    repeating-linear-gradient(45deg, rgba(201,151,58,.02) 0, rgba(201,151,58,.02) 1px, transparent 1px, transparent 40px);
}

/* ── MAIN BODY ── */
.main-body {
  flex: 1; position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px 60px;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  width: 100%; max-width: 680px; margin-bottom: 32px;
}
.progress-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-family: 'Special Elite', cursive; font-size: 11px;
  letter-spacing: 2px; color: rgba(201,151,58,.6); text-transform: uppercase;
}
.progress-count {
  font-family: 'Playfair Display', serif; font-size: 18px;
  color: var(--gold); font-style: italic;
}
.progress-bar-track {
  height: 4px; background: rgba(201,151,58,.15); border-radius: 2px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--gold);
  transition: width .5s cubic-bezier(.4,0,.2,1);
  border-radius: 2px;
}

/* ── LOT CARD ── */
.lot-stage {
  width: 100%; max-width: 680px; position: relative;
  min-height: 460px; display: flex; align-items: center; justify-content: center;
}
.lot-card {
  background: var(--paper);
  border: 3px solid var(--brown);
  padding: 36px 32px 28px;
  width: 100%;
  box-shadow: 8px 8px 0 var(--gold), 12px 12px 0 rgba(201,151,58,.2);
  position: relative;
  animation: cardIn .45s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(30px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.card-exit {
  animation: cardOut .3s ease forwards;
}
@keyframes cardOut {
  to { opacity:0; transform: translateY(-20px) scale(.97); }
}
.card-exit-back {
  animation: cardOutBack .3s ease forwards;
}
@keyframes cardOutBack {
  to { opacity:0; transform: translateY(20px) scale(.97); }
}
@keyframes cardInBack {
  from { opacity:0; transform: translateY(-30px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.lot-badge {
  position: absolute; top: -14px; left: 24px;
  background: var(--gold); color: var(--brown);
  font-family: 'Special Elite', cursive; font-size: 10px;
  letter-spacing: 3px; padding: 4px 14px; text-transform: uppercase;
}
.lot-status-badge {
  position: absolute; top: -14px; right: 24px;
  font-family: 'Special Elite', cursive; font-size: 10px;
  letter-spacing: 2px; padding: 4px 14px; text-transform: uppercase;
}
.lot-status-badge.open   { background: var(--green); color: var(--gold-light); }
.lot-status-badge.sold   { background: var(--red);   color: white; }
.lot-status-badge.skip   { background: var(--brown); color: rgba(201,151,58,.6); border: 1px solid var(--gold); }

.lot-name {
  font-family: 'Playfair Display', serif; font-size: clamp(22px,4vw,32px);
  color: var(--brown); font-style: italic; margin-bottom: 10px; line-height: 1.1;
}
.lot-desc {
  font-size: 13px; color: var(--brown); opacity: .78; line-height: 1.75; margin-bottom: 24px;
}

/* Bid display */
.bid-display {
  background: var(--paper2); border: 2px solid var(--brown);
  padding: 18px 20px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.bid-label { font-family: 'Special Elite', cursive; font-size: 10px; letter-spacing: 3px; color: rgba(61,43,31,.6); text-transform: uppercase; }
.bid-amount {
  font-family: 'Playfair Display', serif; font-size: 46px; color: var(--red);
  font-weight: 700; line-height: 1; transition: transform .15s;
}
.bid-amount.bump { animation: bump .25s ease; }
@keyframes bump { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }

.bid-controls { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  font-family: 'Special Elite', cursive; font-size: 12px; letter-spacing: 2px;
  padding: 10px 22px; border: 1.5px solid var(--brown); background: var(--paper);
  color: var(--brown); cursor: pointer; text-transform: uppercase; transition: all .2s;
}
.btn:hover { background: var(--gold); color: var(--brown); border-color: var(--gold); }
.btn-raise { font-size: 14px; padding: 10px 26px; }

/* Winner input */
.winner-section { margin-top: 4px; }
.winner-label { font-family: 'Special Elite', cursive; font-size: 10px; letter-spacing: 2px; color: rgba(61,43,31,.6); text-transform: uppercase; margin-bottom: 8px; display: block; }
.winner-row { display: flex; gap: 8px; }
.winner-input {
  flex: 1; font-family: 'Courier Prime', monospace; font-size: 13px;
  padding: 10px 14px; border: 1.5px solid rgba(201,151,58,.5);
  background: var(--paper2); color: var(--brown);
  transition: border-color .2s, box-shadow .2s;
}
.winner-input:focus { outline: none; border-color: var(--brown); box-shadow: 3px 3px 0 var(--gold); }
.btn-sell { background: var(--red); color: white; border-color: var(--red); }
.btn-sell:hover { background: #a02828; border-color: #a02828; color: white; }

/* Result overlay on card */
.sold-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 5;
}
.sold-stamp {
  font-family: 'Playfair Display', serif; font-size: 52px; font-style: italic;
  color: var(--red); border: 5px solid var(--red); padding: 12px 36px;
  transform: rotate(-12deg);
  text-shadow: 2px 2px 0 rgba(0,0,0,.15);
  opacity: 0; transition: opacity .3s;
  background: rgba(232,224,204,.85);
}
.lot-card.is-sold .sold-stamp { opacity: 1; }
.skipped-overlay {
  font-family: 'Playfair Display', serif; font-size: 36px; font-style: italic;
  color: rgba(61,43,31,.4); border: 3px dashed rgba(61,43,31,.25); padding: 10px 28px;
  transform: rotate(-8deg);
  opacity: 0; transition: opacity .3s;
  background: transparent;
}
.lot-card.is-skipped .skipped-overlay { opacity: 1; }

/* ── NAV CONTROLS ── */
.nav-controls {
  width: 100%; max-width: 680px; margin-top: 24px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.nav-btn {
  font-family: 'Special Elite', cursive; font-size: 12px; letter-spacing: 2px;
  padding: 12px 24px; border: 1.5px solid rgba(201,151,58,.4);
  background: transparent; color: var(--gold); cursor: pointer;
  text-transform: uppercase; transition: all .2s; display: flex; align-items: center; gap: 8px;
}
.nav-btn:hover { border-color: var(--gold); background: rgba(201,151,58,.1); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.nav-btn.skip { margin-left: auto; border-color: rgba(201,151,58,.25); color: rgba(201,151,58,.55); }
.nav-btn.skip:hover { border-color: rgba(201,151,58,.5); background: rgba(201,151,58,.06); color: var(--gold); }
.add-lot-btn {
  font-family: 'Special Elite', cursive; font-size: 12px; letter-spacing: 2px;
  padding: 12px 24px; border: 1.5px dashed var(--gold);
  background: transparent; color: var(--gold); cursor: pointer;
  text-transform: uppercase; transition: all .2s;
}
.add-lot-btn:hover { background: var(--gold); color: var(--brown); border-style: solid; }

/* ── SUMMARY VIEW ── */
.summary-wrap {
  width: 100%; max-width: 680px;
  display: none;
  animation: cardIn .4s ease both;
}
.summary-title {
  font-family: 'Playfair Display', serif; font-size: 32px; font-style: italic;
  color: var(--gold); text-align: center; margin-bottom: 28px;
}
.summary-item {
  background: var(--paper); border: 2px solid var(--brown);
  padding: 16px 20px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  transition: transform .2s;
}
.summary-item:hover { transform: translateX(4px); }
.summary-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--brown); font-style: italic; }
.summary-winner { font-family: 'Special Elite', cursive; font-size: 11px; letter-spacing: 1px; color: var(--green); }
.summary-bid { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--red); font-weight: 700; }
.summary-skipped { opacity: .45; }
.restart-btn {
  font-family: 'Special Elite', cursive; font-size: 13px; letter-spacing: 3px;
  padding: 14px 36px; background: var(--gold); color: var(--brown);
  border: none; cursor: pointer; text-transform: uppercase; font-weight: 700;
  box-shadow: 5px 5px 0 rgba(201,151,58,.2); display: block; margin: 28px auto 0;
  transition: all .15s;
}
.restart-btn:hover { transform: translate(2px,2px); box-shadow: 3px 3px 0 rgba(201,151,58,.2); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,20,16,.88); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--paper); border: 3px solid var(--gold);
  padding: 36px; max-width: 480px; width: 90%;
  box-shadow: 10px 10px 0 var(--brown);
  animation: popIn .3s ease;
}
@keyframes popIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--brown); font-style: italic; margin-bottom: 20px; }
.modal-box label { font-family: 'Special Elite', cursive; font-size: 10px; letter-spacing: 2px; color: rgba(61,43,31,.6); text-transform: uppercase; display: block; margin-bottom: 6px; }
.modal-box input, .modal-box textarea {
  width: 100%; font-family: 'Courier Prime', monospace; font-size: 13px;
  padding: 11px 14px; border: 1.5px solid var(--gold);
  background: var(--paper2); color: var(--brown); margin-bottom: 16px; resize: vertical;
  transition: border-color .2s, box-shadow .2s;
}
.modal-box input:focus, .modal-box textarea:focus { outline: none; border-color: var(--brown); box-shadow: 3px 3px 0 var(--gold); }
.modal-box textarea { min-height: 100px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-save { font-family: 'Special Elite', cursive; font-size: 12px; letter-spacing: 2px; padding: 10px 24px; background: var(--brown); color: var(--cream); border: none; cursor: pointer; text-transform: uppercase; transition: all .2s; }
.modal-save:hover { background: var(--gold); color: var(--brown); }
.modal-cancel { font-family: 'Special Elite', cursive; font-size: 12px; letter-spacing: 2px; padding: 10px 24px; background: transparent; color: var(--brown); border: 1.5px solid var(--brown); cursor: pointer; text-transform: uppercase; transition: all .2s; }
.modal-cancel:hover { border-color: var(--red); color: var(--red); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--brown); border: 1.5px solid var(--gold);
  color: var(--gold); font-family: 'Special Elite', cursive;
  font-size: 12px; letter-spacing: 2px; padding: 12px 28px;
  text-transform: uppercase; z-index: 600; white-space: nowrap;
  transition: transform .35s cubic-bezier(.16,1,.3,1), opacity .35s;
  opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media(max-width:480px){
  .lot-card { padding: 28px 20px 22px; }
  .bid-amount { font-size: 36px; }
  .nav-btn.skip { margin-left: 0; }
}
</style>
</head>
<body>

<header class="game-header">
  <a class="back-btn" href="../index.html">← Torna</a>
  <div class="header-center">
    <div class="game-header-num">Gioco VI di VII</div>
    <div class="game-header-title">Asta Alcolica</div>
  </div>
  <div style="width:80px"></div>
</header>

<main class="main-body">

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span class="progress-label">Lotto in corso</span>
      <span class="progress-count" id="progressCount">1 / 7</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- LOT STAGE -->
  <div class="lot-stage" id="lotStage"></div>

  <!-- NAV -->
  <div class="nav-controls" id="navControls">
    <button class="nav-btn" id="backBtn" onclick="goBack()" disabled>← Indietro</button>
    <button class="add-lot-btn" onclick="openModal()">+ Nuovo Lotto</button>
    <button class="nav-btn skip" id="skipBtn" onclick="skipLot()">Salta ↷</button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-wrap" id="summaryWrap">
    <div class="summary-title">🔨 Riepilogo Asta</div>
    <div id="summaryList"></div>
    <button class="restart-btn" onclick="restartAsta()">↺ &nbsp; Nuova Asta</button>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title">Aggiungi un Lotto</div>
    <label>Nome del gage</label>
    <input type="text" id="newName" placeholder="Es: Il Selfie Imbarazzante">
    <label>Descrizione</label>
    <textarea id="newDesc" placeholder="Descrivi cosa deve fare il vincitore…"></textarea>
    <label>Offerta iniziale (bicchieri)</label>
    <input type="number" id="newStart" value="1" min="1" max="20">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Annulla</button>
      <button class="modal-save" onclick="addLot()">Aggiungi ◆</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_ITEMS = [
  {name:'La Voce del Professore', desc:'Il vincitore deve imitare per 30 secondi la voce di un professore di Victoria, incluse pause imbarazzanti e tic verbali. Victoria giudica l\'autenticità e assegna il voto.', start:1},
  {name:'Il Rituale Airdrop™', desc:'Eseguire il procedimento completo: scrivere qualcosa a mano → fare lo screen → sistemare la foto → Airdrop → sistemare ancora → incollare nel file. Tempi cronometrati. Chi supera i 5 minuti beve doppio.', start:2},
  {name:'Font Investigator', desc:'Victoria mostra un documento. Il vincitore deve trovare un\'irregolarità di font in meno di 60 secondi. Se non la trova, beve doppio. Se la trova, Victoria beve.', start:1},
  {name:'Il Piano di Studio', desc:'Presentare un piano di studio dettagliato per un esame immaginario con timeline e divisione degli argomenti. Victoria valuta: insufficiente = beve il vincitore. Eccellente = beve Victoria.', start:2},
  {name:'Story Time — Bruxelles', desc:'Victoria racconta un aneddoto. Il vincitore deve indovinare se è vero o inventato. Sbaglia = beve. Indovina = Victoria beve. Se l\'aneddoto coinvolge il negozio di vino, beve tutto il tavolo.', start:1},
  {name:'La Domanda di Diritto', desc:'Una domanda di Diritto Commerciale estratta a caso. Risposta sbagliata = beve. Risposta giusta = Victoria beve in segno di liberazione definitiva dalla materia maledetta.', start:3},
  {name:'Conta le "Tipo"', desc:'Victoria racconta qualcosa per 2 minuti. Gli altri contano le "tipo". Chi indovina il numero più vicino non beve — tutti gli altri sì.', start:1},
];

let items = DEFAULT_ITEMS.map(i => ({...i, bid: i.start, sold: false, skipped: false, winner: ''}));
let cur = 0;

/* ── RENDER ── */
function render(direction = 'forward') {
  const stage = document.getElementById('lotStage');
  const item  = items[cur];
  const total = items.length;

  // progress
  document.getElementById('progressCount').textContent = `${cur + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((cur) / total) * 100}%`;
  document.getElementById('backBtn').disabled = cur === 0;

  const animClass = direction === 'back' ? 'cardInBack' : '';

  stage.innerHTML = `
    <div class="lot-card ${item.sold ? 'is-sold' : ''} ${item.skipped ? 'is-skipped' : ''}" id="lotCard"
         style="animation-name: ${animClass || 'cardIn'}">
      <div class="lot-badge">Lotto ${String(cur + 1).padStart(2,'0')}</div>
      <div class="lot-status-badge ${item.sold ? 'sold' : item.skipped ? 'skip' : 'open'}">
        ${item.sold ? 'Aggiudicato' : item.skipped ? 'Saltato' : 'In corso'}
      </div>

      <div class="lot-name">${item.name}</div>
      <div class="lot-desc">${item.desc}</div>

      <div class="bid-display">
        <div>
          <div class="bid-label">Offerta attuale</div>
          <div class="bid-amount" id="bidAmt">🥂 ${item.bid}</div>
        </div>
        ${!item.sold && !item.skipped ? `
          <div class="bid-controls">
            <button class="btn btn-raise" onclick="raise()">+ Rilancio</button>
            <button class="btn" onclick="lowerBid()">− Ribassa</button>
          </div>
        ` : ''}
      </div>

      ${!item.sold && !item.skipped ? `
        <div class="winner-section">
          <span class="winner-label">Chi si aggiudica il lotto?</span>
          <div class="winner-row">
            <input class="winner-input" id="winnerInput" type="text" placeholder="Nome del vincitore…" value="${item.winner}">
            <button class="btn btn-sell" onclick="sellLot()">🔨 Aggiudicato</button>
          </div>
        </div>
      ` : item.sold ? `
        <div style="font-family:'Special Elite',cursive;font-size:12px;letter-spacing:2px;color:var(--green);margin-top:8px;">
          ◆ Aggiudicato a: <strong>${item.winner}</strong> — per 🥂 ${item.bid}
        </div>
      ` : `
        <div style="font-family:'Special Elite',cursive;font-size:12px;letter-spacing:2px;color:rgba(201,151,58,.5);margin-top:8px;">
          — Lotto saltato —
        </div>
      `}

      <div class="sold-overlay">
        <div class="sold-stamp">VENDUTO</div>
        <div class="skipped-overlay">SALTATO</div>
      </div>
    </div>
  `;

  // skip btn: hide if already done
  document.getElementById('skipBtn').style.opacity = (item.sold || item.skipped) ? '.3' : '1';
  document.getElementById('skipBtn').disabled = item.sold || item.skipped;

  // winner input live save
  const wi = document.getElementById('winnerInput');
  if (wi) wi.addEventListener('input', e => { items[cur].winner = e.target.value; });
}

/* ── ACTIONS ── */
function raise() {
  items[cur].bid++;
  document.getElementById('bidAmt').textContent = '🥂 ' + items[cur].bid;
  document.getElementById('bidAmt').classList.remove('bump');
  void document.getElementById('bidAmt').offsetWidth;
  document.getElementById('bidAmt').classList.add('bump');
}
function lowerBid() {
  if (items[cur].bid <= 1) return;
  items[cur].bid--;
  document.getElementById('bidAmt').textContent = '🥂 ' + items[cur].bid;
}
function sellLot() {
  const wi = document.getElementById('winnerInput');
  const name = (wi ? wi.value : items[cur].winner).trim();
  if (!name) { showToast('Inserisci il nome del vincitore!'); return; }
  items[cur].winner = name;
  items[cur].sold = true;
  showToast(`🔨 Aggiudicato a ${name} per 🥂 ${items[cur].bid}!`);
  render();
  setTimeout(() => advanceOrEnd(), 1200);
}
function skipLot() {
  if (items[cur].sold || items[cur].skipped) return;
  items[cur].skipped = true;
  render();
  setTimeout(() => advanceOrEnd(), 800);
}
function advanceOrEnd() {
  if (cur < items.length - 1) {
    nextLot();
  } else {
    showSummary();
  }
}

/* ── NAVIGATION ── */
function nextLot() {
  if (cur >= items.length - 1) { showSummary(); return; }
  const card = document.getElementById('lotCard');
  if (card) {
    card.classList.add('card-exit');
    setTimeout(() => { cur++; render('forward'); }, 300);
  } else { cur++; render('forward'); }
}
function goBack() {
  if (cur === 0) return;
  const card = document.getElementById('lotCard');
  if (card) {
    card.classList.add('card-exit-back');
    setTimeout(() => { cur--; render('back'); }, 300);
  } else { cur--; render('back'); }
}

/* ── SUMMARY ── */
function showSummary() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('lotStage').style.display = 'none';
  document.getElementById('navControls').style.display = 'none';
  const sw = document.getElementById('summaryWrap');
  sw.style.display = 'block';
  const list = document.getElementById('summaryList');
  list.innerHTML = items.map((it, i) => `
    <div class="summary-item ${it.skipped ? 'summary-skipped' : ''}">
      <div>
        <div class="summary-name">${String(i+1).padStart(2,'0')}. ${it.name}</div>
        ${it.sold ? `<div class="summary-winner">◆ ${it.winner}</div>` : `<div style="font-family:'Special Elite',cursive;font-size:10px;letter-spacing:1px;color:rgba(61,43,31,.4);">— saltato —</div>`}
      </div>
      <div class="summary-bid">${it.sold ? '🥂 ' + it.bid : '—'}</div>
    </div>
  `).join('');
}
function restartAsta() {
  items = DEFAULT_ITEMS.map(i => ({...i, bid: i.start, sold: false, skipped: false, winner: ''}));
  cur = 0;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('lotStage').style.display = 'flex';
  document.getElementById('navControls').style.display = 'flex';
  document.getElementById('summaryWrap').style.display = 'none';
  render();
}

/* ── ADD LOT MODAL ── */
function openModal()  { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function addLot() {
  const name  = document.getElementById('newName').value.trim();
  const desc  = document.getElementById('newDesc').value.trim();
  const start = Math.max(1, parseInt(document.getElementById('newStart').value) || 1);
  if (!name || !desc) { showToast('Compila nome e descrizione!'); return; }
  items.push({ name, desc, start, bid: start, sold: false, skipped: false, winner: '' });
  closeModal();
  document.getElementById('newName').value = '';
  document.getElementById('newDesc').value = '';
  document.getElementById('newStart').value = 1;
  showToast(`Lotto "${name}" aggiunto!`);
  render();
}
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight') nextLot();
  if (e.key === 'ArrowLeft')  goBack();
  if (e.key === '+') raise();
});

/* ── INIT ── */
render();
</script>

<!-- inject cardInBack keyframe via style -->
<style>
@keyframes cardInBack {
  from { opacity:0; transform: translateY(-30px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
</style>
