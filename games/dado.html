<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Dado delle Conseguenze — Rana Laurea</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--brown:#3D2B1F;--gold:#C9973A;--gold-light:#E8C97A;--red:#8B2020;--dark:#0D0A07;--green:#2D5A3D;--paper:#E8E0CC;--paper2:#DED5BC;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--cream);font-family:'Courier Prime',monospace;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 10%,rgba(201,151,58,.09) 0%,transparent 55%),radial-gradient(ellipse at 50% 90%,rgba(139,32,32,.06) 0%,transparent 55%);}

.game-header{background:rgba(0,0,0,.65);border-bottom:2px solid var(--gold);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.back-btn{font-family:'Special Elite',cursive;font-size:11px;letter-spacing:2px;padding:7px 16px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;text-decoration:none;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.back-btn:hover{background:var(--gold);color:var(--brown);}
.hcenter{flex:1;text-align:center;}
.hnum{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:rgba(201,151,58,.45);text-transform:uppercase;}
.htitle{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--gold);}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px 56px;position:relative;z-index:1;}
.screen{width:100%;max-width:620px;}
.hidden{display:none!important;}

/* ── DADO 3D ── */
.dice-scene{width:160px;height:160px;perspective:600px;margin:0 auto 32px;cursor:pointer;}
.dice{width:160px;height:160px;position:relative;transform-style:preserve-3d;transition:transform 1.2s cubic-bezier(.17,.67,.12,.99);filter:drop-shadow(0 12px 32px rgba(0,0,0,.7));}
.face{position:absolute;width:160px;height:160px;background:var(--paper);border:3px solid var(--brown);display:flex;align-items:center;justify-content:center;font-size:52px;box-shadow:inset 0 0 20px rgba(61,43,31,.15);}
.face.f1{transform:rotateY(0deg)   translateZ(80px);}
.face.f2{transform:rotateY(180deg) translateZ(80px);}
.face.f3{transform:rotateY(90deg)  translateZ(80px);}
.face.f4{transform:rotateY(-90deg) translateZ(80px);}
.face.f5{transform:rotateX(90deg)  translateZ(80px);}
.face.f6{transform:rotateX(-90deg) translateZ(80px);}

@keyframes roll{
  0%  {transform:rotateX(0) rotateY(0) rotateZ(0);}
  25% {transform:rotateX(360deg) rotateY(180deg) rotateZ(90deg);}
  60% {transform:rotateX(540deg) rotateY(360deg) rotateZ(180deg);}
  80% {transform:rotateX(620deg) rotateY(440deg) rotateZ(220deg);}
  90% {transform:rotateX(640deg) rotateY(460deg) rotateZ(235deg);}
  100%{transform:var(--final-rot);}
}
.dice.rolling{animation:roll 1.6s cubic-bezier(.17,.67,.12,.99) forwards;}

/* ── CARD RESULT ── */
.result-card{background:var(--paper);border:3px solid var(--brown);padding:32px 28px;box-shadow:8px 8px 0 var(--gold);text-align:center;position:relative;animation:cardIn .5s cubic-bezier(.16,1,.3,1) both;}
@keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.result-face-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--brown);font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;padding:4px 16px;text-transform:uppercase;white-space:nowrap;}
.result-emoji{font-size:52px;display:block;margin:8px 0 16px;}
.result-category{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin-bottom:8px;}
.result-text{font-family:'Playfair Display',serif;font-size:clamp(18px,3.5vw,26px);font-style:italic;color:var(--brown);line-height:1.4;}
.result-shots{display:inline-block;font-family:'Playfair Display',serif;font-size:36px;color:var(--red);font-weight:700;padding:10px 24px;border:2px solid var(--red);margin-top:16px;animation:shotsIn .4s cubic-bezier(.16,1,.3,1) .2s both;}
@keyframes shotsIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

/* ── BUTTONS ── */
.roll-btn{font-family:'Special Elite',cursive;font-size:15px;letter-spacing:4px;padding:18px 56px;background:var(--gold);color:var(--brown);border:none;cursor:pointer;text-transform:uppercase;font-weight:700;box-shadow:6px 6px 0 rgba(201,151,58,.15),0 4px 20px rgba(201,151,58,.2);transition:all .15s;display:block;margin:0 auto;position:relative;overflow:hidden;}
.roll-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);transform:translateX(-100%);transition:transform .4s;}
.roll-btn:hover::before{transform:translateX(100%);}
.roll-btn:hover{transform:translate(2px,2px);box-shadow:4px 4px 0 rgba(201,151,58,.15);}
.roll-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

.players-strip{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;}
.player-chip{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:1px;padding:6px 14px;border:1px solid rgba(201,151,58,.25);color:rgba(201,151,58,.45);text-transform:uppercase;transition:all .35s;cursor:default;}
.player-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(201,151,58,.1);box-shadow:0 0 10px rgba(201,151,58,.2);}

.turn-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.turn-label{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:rgba(201,151,58,.45);text-transform:uppercase;}
.turn-name{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:var(--gold-light);}
.turn-count{font-family:'Special Elite',cursive;font-size:11px;letter-spacing:2px;color:rgba(201,151,58,.4);}

/* SETUP */
.setup-box{background:rgba(201,151,58,.04);border:2px solid rgba(201,151,58,.22);padding:52px 40px;text-align:center;animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.setup-eyebrow{font-family:'Special Elite',cursive;font-size:11px;letter-spacing:5px;color:rgba(201,151,58,.5);text-transform:uppercase;margin-bottom:12px;}
.setup-title{font-family:'Playfair Display',serif;font-size:clamp(36px,7vw,60px);color:var(--gold);font-style:italic;line-height:1;margin-bottom:6px;}
.setup-sub{font-family:'Special Elite',cursive;font-size:11px;letter-spacing:4px;color:rgba(201,151,58,.45);text-transform:uppercase;margin-bottom:32px;}
.field-label{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:rgba(201,151,58,.55);text-transform:uppercase;display:block;margin-bottom:7px;text-align:left;}
.setup-textarea{width:100%;font-family:'Courier Prime',monospace;font-size:13px;padding:12px 16px;border:1.5px solid rgba(201,151,58,.3);background:rgba(201,151,58,.05);color:var(--cream);resize:vertical;min-height:110px;transition:border-color .2s;margin-bottom:24px;}
.setup-textarea:focus{outline:none;border-color:var(--gold);}
.start-btn{font-family:'Special Elite',cursive;font-size:14px;letter-spacing:4px;padding:16px 48px;background:var(--gold);color:var(--brown);border:none;cursor:pointer;text-transform:uppercase;font-weight:700;box-shadow:6px 6px 0 rgba(201,151,58,.15);transition:all .15s;}
.start-btn:hover{transform:translate(2px,2px);box-shadow:4px 4px 0 rgba(201,151,58,.15);}

.next-btn{font-family:'Special Elite',cursive;font-size:12px;letter-spacing:3px;padding:12px 30px;background:var(--brown);color:var(--cream);border:none;cursor:pointer;text-transform:uppercase;transition:all .2s;box-shadow:4px 4px 0 rgba(0,0,0,.3);display:block;margin:16px auto 0;}
.next-btn:hover{background:var(--gold);color:var(--brown);}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);border:1.5px solid var(--gold);color:var(--gold);font-family:'Special Elite',cursive;font-size:12px;letter-spacing:2px;padding:12px 28px;text-transform:uppercase;z-index:600;white-space:nowrap;transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .35s;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

.cp{position:fixed;pointer-events:none;z-index:999;animation:cpFall linear forwards;border-radius:2px;}
@keyframes cpFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(105vh) rotate(720deg)}}

@media(max-width:420px){
  .setup-box{padding:32px 18px;}
  .dice-scene{width:120px;height:120px;}
  .face{width:120px;height:120px;font-size:40px;}
  .face.f1{transform:rotateY(0deg) translateZ(60px);}
  .face.f2{transform:rotateY(180deg) translateZ(60px);}
  .face.f3{transform:rotateY(90deg) translateZ(60px);}
  .face.f4{transform:rotateY(-90deg) translateZ(60px);}
  .face.f5{transform:rotateX(90deg) translateZ(60px);}
  .face.f6{transform:rotateX(-90deg) translateZ(60px);}
}
</style>
</head>
<body>

<header class="game-header">
  <a class="back-btn" href="../index.html">← Torna</a>
  <div class="hcenter">
    <div class="hnum">Gioco X di XI</div>
    <div class="htitle">Dado delle Conseguenze</div>
  </div>
  <div style="width:80px"></div>
</header>

<main class="main">

  <!-- SETUP -->
  <div class="screen" id="setupScreen">
    <div class="setup-box">
      <div class="setup-eyebrow">✦ &nbsp; Il dado decide tutto &nbsp; ✦</div>
      <div class="setup-title">Dado delle<br><em style="color:var(--green)">Conseguenze</em></div>
      <div class="setup-sub">Edizione Laurea di Rana</div>
      <span class="field-label">Giocatori (uno per riga)</span>
      <textarea class="setup-textarea" id="playersInput" placeholder="Victoria&#10;Marco&#10;Carlotta&#10;Annalisa&#10;..."></textarea>
      <button class="start-btn" onclick="startGame()">✦ Lancia il Dado ✦</button>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen hidden" id="gameScreen">

    <div class="turn-bar">
      <div>
        <div class="turn-label">Tocca a</div>
        <div class="turn-name" id="turnName">—</div>
      </div>
      <div class="turn-count" id="turnCount">Round 1</div>
    </div>

    <div class="players-strip" id="playersStrip"></div>

    <div class="dice-scene" id="diceScene" onclick="rollDice()">
      <div class="dice" id="dice">
        <div class="face f1">🎲</div>
        <div class="face f2">🥂</div>
        <div class="face f3">🐸</div>
        <div class="face f4">🎓</div>
        <div class="face f5">🏆</div>
        <div class="face f6">☠️</div>
      </div>
    </div>

    <div id="resultArea" style="margin-bottom:20px;"></div>

    <button class="roll-btn" id="rollBtn" onclick="rollDice()">✦ LANCIA IL DADO ✦</button>

  </div>

</main>

<div class="toast" id="toast"></div>

<script>
/* ── CONSEGUENZE ── */
const CONSEQUENCES = [
  // 1 shot
  { shots:1, emoji:'🥂', cat:'Mild', texts:[
    'Bevi 1 shot. Benvenuto alla festa.',
    'Solo 1 shot — considerati fortunato.',
    '1 shot. L\'Oracolo ha parlato.',
    'Bevi 1. Poteva andare peggio.',
  ]},
  // 2 shot
  { shots:2, emoji:'🍺', cat:'Medio', texts:[
    'Bevi 2 shot. Il dado non mente.',
    '2 shot. Uno per ogni cervello che non hai usato.',
    'Doppio! Bevi 2 shot in sequenza.',
    '2 shot. La Rana approva.',
  ]},
  // 3 shot + gage
  { shots:3, emoji:'🎭', cat:'Gage', texts:[
    'Bevi 3 shot E imita la voce di un professore per 30 secondi.',
    'Bevi 3 shot E di\' "tipo" ogni volta che parli per il prossimo minuto.',
    'Bevi 3 shot E spiega il Metodo Airdrop™ a qualcuno.',
    'Bevi 3 shot E canta una canzone a scelta del tavolo.',
  ]},
  // Sfida
  { shots:0, emoji:'⚔️', cat:'Sfida', texts:[
    'Sfida! Scegli qualcuno — chi perde beve 3 shot: indovinate quante volte Victoria dice "tipo" in un minuto.',
    'Sfida! Tu vs il tuo vicino: chi ricorda più materie del corso di Victoria? Il perdente beve 2.',
    'Sfida! Chi imita meglio Victoria che scopre un font sbagliato? Il tavolo vota — il perdente beve 2.',
    'Sfida! Chi sa più parole in francese? Victoria arbitro. Il perdente beve 2.',
  ]},
  // Tutti bevono
  { shots:0, emoji:'🐸', cat:'Tutti Bevono', texts:[
    'TUTTI BEVONO! La Rana ha deciso.',
    'Giro di shot per tutti — nessuno escluso.',
    'Tutti bevono 1 shot. Il dado è equo.',
    'Giro obbligatorio: tutti alzano il bicchiere.',
  ]},
  // Jackpot / Salvo
  { shots:0, emoji:'🏆', cat:'Salvato!', texts:[
    'SEI SALVO! Non bevi nulla — ma devi fare un brindisi a Victoria.',
    'Fortunato! Niente shot per te — stavolta.',
    'Il dado ti ha graziato. Dai però un shot a chi vuoi tu.',
    'Salvo! Ma devi dire qualcosa di carino sulla Rana.',
  ]},
];

// Face index → category index mapping
const FACE_TO_CAT = [0,1,2,3,4,5]; // f1→mild, f2→medio, f3→gage, f4→sfida, f5→tutti, f6→jackpot

// Final rotation for each face to be visible
const FACE_ROTATIONS = [
  'rotateX(0deg) rotateY(0deg)',       // face 1 front
  'rotateX(0deg) rotateY(180deg)',     // face 2 back
  'rotateX(0deg) rotateY(-90deg)',     // face 3 right→left
  'rotateX(0deg) rotateY(90deg)',      // face 4 left→right
  'rotateX(-90deg) rotateY(0deg)',     // face 5 top
  'rotateX(90deg) rotateY(0deg)',      // face 6 bottom
];

let players=[], curPlayer=0, round=1, rolling=false;

function startGame(){
  const raw=document.getElementById('playersInput').value.trim();
  if(!raw){showToast('Inserisci almeno un giocatore!');return;}
  players=raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(players.length<1){showToast('Almeno un giocatore!');return;}
  curPlayer=0; round=1;
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  renderPlayers();
  updateTurn();
}

function renderPlayers(){
  document.getElementById('playersStrip').innerHTML=
    players.map((p,i)=>`<div class="player-chip ${i===curPlayer?'active':''}" id="chip${i}">${p}</div>`).join('');
}

function updateTurn(){
  document.getElementById('turnName').textContent=players[curPlayer];
  document.getElementById('turnCount').textContent=`Round ${round}`;
  document.querySelectorAll('.player-chip').forEach((c,i)=>c.classList.toggle('active',i===curPlayer));
}

function rollDice(){
  if(rolling) return;
  rolling=true;
  document.getElementById('rollBtn').disabled=true;
  document.getElementById('resultArea').innerHTML='';

  const faceIdx = Math.floor(Math.random()*6); // 0-5
  const dice=document.getElementById('dice');

  // Build a random tumbling animation ending on the chosen face
  const extraX=(2+Math.floor(Math.random()*3))*360;
  const extraY=(2+Math.floor(Math.random()*3))*360;
  const finalRot=FACE_ROTATIONS[faceIdx];

  dice.style.setProperty('--final-rot', `rotateX(${extraX}deg) rotateY(${extraY}deg) ${finalRot}`);
  dice.classList.remove('rolling');
  void dice.offsetWidth;
  dice.classList.add('rolling');

  setTimeout(()=>{
    dice.classList.remove('rolling');
    dice.style.transform=finalRot;
    rolling=false;
    showResult(faceIdx);
  },1650);
}

function showResult(faceIdx){
  const cat=CONSEQUENCES[FACE_TO_CAT[faceIdx]];
  const text=cat.texts[Math.floor(Math.random()*cat.texts.length)];

  const html=`
    <div class="result-card">
      <div class="result-face-badge">Faccia ${faceIdx+1} — ${cat.cat}</div>
      <span class="result-emoji">${cat.emoji}</span>
      <div class="result-category">${cat.cat}</div>
      <div class="result-text">${text}</div>
      ${cat.shots>0?`<div class="result-shots">${cat.shots} 🥂</div>`:''}
    </div>
  `;
  document.getElementById('resultArea').innerHTML=html;

  if(cat.cat==='Salvato!') launchConfetti(40);
  if(cat.cat==='Tutti Bevono') showToast('TUTTI ALZANO IL BICCHIERE! 🥂');

  document.getElementById('rollBtn').disabled=false;

  // Add next player button
  const nb=document.createElement('button');
  nb.className='next-btn';
  nb.textContent='Prossimo giocatore →';
  nb.onclick=nextPlayer;
  document.getElementById('resultArea').appendChild(nb);
}

function nextPlayer(){
  curPlayer=(curPlayer+1)%players.length;
  if(curPlayer===0) round++;
  updateTurn();
  document.getElementById('resultArea').innerHTML='';
  // reset dice visual
  document.getElementById('dice').style.transform='rotateX(0deg) rotateY(0deg)';
}

let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

function launchConfetti(n){
  const colors=['#C9973A','#E8C97A','#8B2020','#2D5A3D','#F5F0E8'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='cp';
      const s=5+Math.random()*8;
      el.style.cssText=`left:${Math.random()*100}vw;top:-8px;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation-duration:${1.3+Math.random()*2}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*20);
  }
}
</script>
</body>
</html>
