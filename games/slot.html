<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Slot Machine — Rana Laurea</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F5F0E8; --brown:#3D2B1F; --gold:#C9973A; --gold-light:#E8C97A;
  --red:#8B2020; --dark:#0D0A07; --felt:#1a0f05; --chrome:#b8860b;
  --paper:#E8E0CC; --green:#2D5A3D;
}
*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Courier Prime', monospace;
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow-x: hidden;
}

/* ── BG ── */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201,151,58,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(139,32,32,.08) 0%, transparent 60%);
}

/* ── HEADER ── */
.game-header {
  background:rgba(0,0,0,.7); border-bottom:2px solid var(--gold);
  padding:14px 24px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:100; backdrop-filter:blur(8px);
}
.back-btn {
  font-family:'Special Elite',cursive; font-size:11px; letter-spacing:2px;
  padding:7px 16px; border:1.5px solid var(--gold); background:transparent;
  color:var(--gold); cursor:pointer; text-decoration:none; text-transform:uppercase;
  transition:all .2s; white-space:nowrap;
}
.back-btn:hover{background:var(--gold);color:var(--brown);}
.hcenter{flex:1;text-align:center;}
.hnum{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:rgba(201,151,58,.45);text-transform:uppercase;}
.htitle{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--gold);}

/* ── MAIN ── */
.main {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:32px 16px 48px; position:relative; z-index:1;
}

/* ── MACHINE BODY ── */
.machine {
  width:100%; max-width:560px;
  background: linear-gradient(160deg, #2a1a0a 0%, #1a0f05 40%, #120a03 100%);
  border: 3px solid var(--chrome);
  border-radius: 16px 16px 8px 8px;
  box-shadow:
    0 0 0 1px rgba(201,151,58,.3),
    0 8px 40px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(201,151,58,.2),
    inset 0 -2px 0 rgba(0,0,0,.5);
  overflow: hidden;
}

/* ── TOP MARQUEE ── */
.marquee {
  background: linear-gradient(180deg, #1a0d00, #0d0600);
  border-bottom: 2px solid var(--chrome);
  padding: 14px 20px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.marquee-lights {
  display: flex; justify-content: space-between;
  margin-bottom: 10px; padding: 0 10px;
}
.bulb {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold), 0 0 12px rgba(201,151,58,.5);
  animation: bulbFlash 1.2s ease-in-out infinite;
}
.bulb:nth-child(2n) { animation-delay: .3s; }
.bulb:nth-child(3n) { animation-delay: .6s; }
.bulb:nth-child(4n) { animation-delay: .9s; }
@keyframes bulbFlash {
  0%,100%{ opacity:1; box-shadow:0 0 6px var(--gold),0 0 14px rgba(201,151,58,.6); }
  50%    { opacity:.3; box-shadow:0 0 2px rgba(201,151,58,.3); }
}
.marquee-title {
  font-family:'Playfair Display',serif; font-size:clamp(18px,4vw,28px);
  color:var(--gold); font-style:italic; letter-spacing:2px;
  text-shadow: 0 0 20px rgba(201,151,58,.6), 0 2px 4px rgba(0,0,0,.8);
}
.marquee-sub {
  font-family:'Special Elite',cursive; font-size:10px; letter-spacing:4px;
  color:rgba(201,151,58,.5); text-transform:uppercase; margin-top:4px;
}

/* ── SCREEN AREA ── */
.screen-area {
  background: #080503;
  border-top: 2px solid rgba(201,151,58,.3);
  border-bottom: 2px solid rgba(201,151,58,.3);
  padding: 24px 24px 16px;
  position: relative;
}

/* payline marker */
.payline {
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 3px; margin-top: -1px;
  background: linear-gradient(90deg, transparent, rgba(255,60,60,.6) 20%, rgba(255,60,60,.8) 50%, rgba(255,60,60,.6) 80%, transparent);
  z-index: 10; pointer-events:none;
  box-shadow: 0 0 8px rgba(255,60,60,.5);
}
.payline::before, .payline::after {
  content:'◀'; position:absolute; top:50%; transform:translateY(-50%);
  color:rgba(255,60,60,.7); font-size:12px;
}
.payline::before{left:6px; content:'▶';}
.payline::after{right:6px;}

/* ── REELS ── */
.reels-row {
  display: flex; gap: 12px; justify-content: center;
}
.reel-wrap {
  flex: 1; max-width: 140px;
  background: linear-gradient(180deg, #0a0603 0%, #140d06 50%, #0a0603 100%);
  border: 2px solid rgba(201,151,58,.35);
  border-radius: 6px;
  height: 140px;
  overflow: hidden;
  position: relative;
  box-shadow:
    inset 0 8px 16px rgba(0,0,0,.8),
    inset 0 -8px 16px rgba(0,0,0,.8);
}

/* top/bottom fade masks */
.reel-wrap::before, .reel-wrap::after {
  content:''; position:absolute; left:0; right:0; height:48px; z-index:5; pointer-events:none;
}
.reel-wrap::before {
  top:0;
  background:linear-gradient(180deg, rgba(8,5,3,1) 0%, transparent 100%);
}
.reel-wrap::after {
  bottom:0;
  background:linear-gradient(0deg, rgba(8,5,3,1) 0%, transparent 100%);
}

canvas.reel-canvas {
  display:block; width:100%; position:absolute; top:0; left:0;
}

/* reel border glow on win */
.reel-wrap.win-glow {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(201,151,58,.7), inset 0 8px 16px rgba(0,0,0,.6), inset 0 -8px 16px rgba(0,0,0,.6);
  animation: reelPulse .4s ease-in-out infinite alternate;
}
@keyframes reelPulse {
  from{box-shadow:0 0 12px rgba(201,151,58,.5),inset 0 8px 16px rgba(0,0,0,.6),inset 0 -8px 16px rgba(0,0,0,.6);}
  to  {box-shadow:0 0 28px rgba(201,151,58,.9),inset 0 8px 16px rgba(0,0,0,.4),inset 0 -8px 16px rgba(0,0,0,.4);}
}
.reel-wrap.jackpot-glow {
  border-color: #ff4444;
  animation: jackpotPulse .3s ease-in-out infinite alternate;
}
@keyframes jackpotPulse {
  from{box-shadow:0 0 16px rgba(255,68,68,.6),inset 0 4px 12px rgba(0,0,0,.5);}
  to  {box-shadow:0 0 36px rgba(255,68,68,1),inset 0 4px 12px rgba(0,0,0,.3);}
}

/* reel label */
.reel-label {
  font-family:'Special Elite',cursive; font-size:9px; letter-spacing:2px;
  color:rgba(201,151,58,.35); text-transform:uppercase;
  text-align:center; margin-top:8px;
}

/* ── RESULT DISPLAY ── */
.result-panel {
  margin-top: 16px;
  min-height: 60px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center;
}
.result-text {
  font-family:'Playfair Display',serif; font-size:clamp(16px,3vw,22px);
  font-style:italic; color:var(--gold-light); line-height:1.35;
  opacity:0; transform:translateY(6px);
  transition:opacity .4s, transform .4s;
}
.result-text.show{opacity:1;transform:translateY(0);}
.result-text.jackpot-text{
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.8), 0 0 40px rgba(255,215,0,.4);
  animation:jackpotText .5s ease-in-out infinite alternate;
}
@keyframes jackpotText{
  from{transform:scale(1);}
  to{transform:scale(1.04);}
}

/* ── CREDIT PANEL ── */
.credit-panel {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 24px; border-top:1px solid rgba(201,151,58,.15);
  flex-wrap:wrap; gap:8px;
}
.credit-box {
  background:#0a0603; border:1px solid rgba(201,151,58,.25);
  padding:6px 14px; text-align:center;
}
.credit-label{font-family:'Special Elite',cursive;font-size:8px;letter-spacing:2px;color:rgba(201,151,58,.4);text-transform:uppercase;display:block;margin-bottom:2px;}
.credit-val{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);font-weight:700;}

/* ── BUTTON AREA ── */
.btn-area {
  padding: 20px 24px 28px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  background:linear-gradient(0deg,#0a0603,#130c05);
}

.spin-btn {
  font-family:'Special Elite',cursive; font-size:16px; letter-spacing:5px;
  padding:18px 0; width:100%; max-width:280px;
  background: linear-gradient(180deg, #c0392b 0%, #8B2020 50%, #6b1515 100%);
  color:white; border:none; cursor:pointer; text-transform:uppercase;
  border-radius:4px;
  box-shadow:
    0 6px 0 #4a0e0e,
    0 8px 20px rgba(139,32,32,.6),
    inset 0 1px 0 rgba(255,255,255,.15);
  transition:all .1s;
  position:relative; overflow:hidden;
}
.spin-btn::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);
  transform:translateX(-100%); transition:transform .5s;
}
.spin-btn:hover::before{transform:translateX(100%);}
.spin-btn:hover{
  background:linear-gradient(180deg,#d44 0%,#a02020 50%,#7b1a1a 100%);
  box-shadow:0 6px 0 #4a0e0e,0 10px 28px rgba(139,32,32,.8),inset 0 1px 0 rgba(255,255,255,.2);
}
.spin-btn:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #4a0e0e,0 4px 12px rgba(139,32,32,.5),inset 0 1px 0 rgba(255,255,255,.1);
}
.spin-btn:disabled{
  opacity:.45; cursor:not-allowed; transform:none;
  box-shadow:0 4px 0 #2a0808,0 6px 10px rgba(0,0,0,.4);
}

.bet-row {
  display:flex; align-items:center; gap:12px;
}
.bet-label{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:2px;color:rgba(201,151,58,.45);text-transform:uppercase;}
.bet-btn{
  font-family:'Special Elite',cursive;font-size:12px;letter-spacing:1px;
  padding:6px 14px; border:1px solid rgba(201,151,58,.3);
  background:transparent; color:var(--gold); cursor:pointer; transition:all .2s;
}
.bet-btn:hover{background:rgba(201,151,58,.1);border-color:var(--gold);}
.bet-btn.active{background:var(--gold);color:var(--brown);border-color:var(--gold);}

/* ── WIN OVERLAY ── */
.win-overlay {
  position:fixed; inset:0; z-index:200; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
.win-banner {
  font-family:'Playfair Display',serif; font-size:clamp(32px,8vw,72px);
  font-style:italic; font-weight:700;
  color:#ffd700;
  text-shadow:0 0 30px rgba(255,215,0,.9),0 0 60px rgba(255,215,0,.5),0 4px 8px rgba(0,0,0,.8);
  opacity:0; transform:scale(.6);
  transition:opacity .3s,transform .4s cubic-bezier(.16,1,.3,1);
  text-align:center; padding:0 20px;
}
.win-banner.show{opacity:1;transform:scale(1);}

/* ── CONFETTI ── */
.confetti-p{position:fixed;pointer-events:none;z-index:300;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) rotate(720deg);}}

/* ── COIN ── */
.coin{position:fixed;pointer-events:none;z-index:300;font-size:28px;animation:coinFly .9s ease-in forwards;}
@keyframes coinFly{
  0%{opacity:1;transform:translateY(0) scale(1);}
  60%{opacity:1;transform:translateY(-80px) scale(1.2);}
  100%{opacity:0;transform:translateY(-160px) scale(.5);}
}

@media(max-width:420px){
  .reels-row{gap:8px;}
  .reel-wrap{height:110px;}
  .machine{border-radius:10px 10px 6px 6px;}
}
</style>
</head>

        </div>
        <div style="flex:1;max-width:140px;">

        <div style="flex:1;max-width:140px;">

        <button class="bet-btn" onclick="setBet(this,2)">🥂 ×2</button>
        <button class="bet-btn" onclick="setBet(this,3)">🥂 ×3</button>

  </div>
</main>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-banner" id="winBanner"></div>
</div>

<script>
/* ══════════════════════════════
   SYMBOLS
══════════════════════════════ */
const SYMBOLS = [
  { e:'🎓', name:'Laurea',   weight:4  },
  { e:'🐸', name:'Rana',     weight:6  },
  { e:'📚', name:'Libri',    weight:8  },
  { e:'💼', name:'Lavoro',   weight:8  },
  { e:'🍷', name:'Vino',     weight:10 },
  { e:'📊', name:'Grafico',  weight:8  },
  { e:'💶', name:'Soldi',    weight:6  },
  { e:'🔮', name:'Oracolo',  weight:5  },
  { e:'🏦', name:'Banca',    weight:5  },
  { e:'🍺', name:'Birra',    weight:10 },
  { e:'📐', name:'Font',     weight:4  },
  { e:'✈️',  name:'Erasmus', weight:4  },
];

// build weighted pool
const POOL = [];
SYMBOLS.forEach(s=>{ for(let i=0;i<s.weight;i++) POOL.push(s); });

function randSym(){ return POOL[Math.floor(Math.random()*POOL.length)]; }

/* ══════════════════════════════
   REEL RENDERER
══════════════════════════════ */
const REEL_VISIBLE = 3;   // symbols visible at once
const SYM_H = 80;         // px per symbol cell (canvas units)
const SYM_W = 120;
const STRIP_LEN = 20;     // symbols on the virtual strip

class Reel {
  constructor(canvasEl, wrapEl) {
    this.canvas = canvasEl;
    this.wrap   = wrapEl;
    this.ctx    = canvasEl.getContext('2d');
    this.strip  = Array.from({length:STRIP_LEN}, ()=>randSym());
    this.offset = 0;       // fractional strip position (0 = first sym centered)
    this.vel    = 0;
    this.spinning = false;
    this.targetPos = null;
    this.finalIdx  = 0;
    this.resize();
  }

  resize() {
    const w = this.wrap.clientWidth || SYM_W;
    const h = this.wrap.clientHeight || SYM_H * REEL_VISIBLE;
    this.canvas.width  = w;
    this.canvas.height = h;
    this.symH = h / REEL_VISIBLE;
    this.draw();
  }

  draw() {
    const ctx = this.ctx;
    const w = this.canvas.width, h = this.canvas.height;
    ctx.clearRect(0,0,w,h);

    // background gradient per reel
    const bg = ctx.createLinearGradient(0,0,w,0);
    bg.addColorStop(0,'#0f0803');
    bg.addColorStop(.5,'#1a0f06');
    bg.addColorStop(1,'#0f0803');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,w,h);

    // draw symbols
    const center = h/2;
    const startOff = (this.offset % 1) * this.symH;
    const firstIdx = Math.floor(this.offset);

    for(let i=-1; i<=REEL_VISIBLE+1; i++){
      const y = center + (i - REEL_VISIBLE/2 + .5) * this.symH - startOff;
      const idx = ((firstIdx + i) % this.strip.length + this.strip.length) % this.strip.length;
      const sym = this.strip[idx];

      // distance from center (0 = center, 1 = edge)
      const dist = Math.abs(y - center) / (h/2);
      const alpha = Math.max(0, 1 - dist * 1.4);
      const scale = 1 - dist * 0.25;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(w/2, y);
      ctx.scale(scale, scale);

      // highlight center cell
      const isCenterCell = Math.abs(y - center) < this.symH * 0.52;
      if(isCenterCell && !this.spinning){
        ctx.fillStyle = 'rgba(201,151,58,0.08)';
        ctx.fillRect(-w/2, -this.symH/2, w, this.symH);
      }

      ctx.font = `${this.symH * 0.56}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(sym.e, 0, 0);

      ctx.restore();
    }

    // separator lines
    ctx.strokeStyle = 'rgba(201,151,58,0.15)';
    ctx.lineWidth = 1;
    for(let i=0;i<=REEL_VISIBLE;i++){
      const y = i * this.symH;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }
  }

  getCenterSymbol(){
    const idx = Math.round(this.offset) % this.strip.length;
    return this.strip[(idx + this.strip.length) % this.strip.length];
  }
}

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let reels = [];
let spinning = false;
let tries = 0, wins = 0, jackpots = 0;
let bet = 1;
let raf;

/* ══════════════════════════════
   INIT
══════════════════════════════ */
function init(){
  // lights
  const lightsEl = document.getElementById('lights');
  for(let i=0;i<16;i++){
    const b = document.createElement('div');
    b.className = 'bulb';
    b.style.animationDelay = (i*0.075)+'s';
    lightsEl.appendChild(b);
  }

  // reels
  for(let i=0;i<3;i++){
    const canvas = document.getElementById('reel'+i);
    const wrap   = document.getElementById('wrap'+i);
    reels.push(new Reel(canvas, wrap));
  }

  // idle animation
  idleTick();
}

/* ══════════════════════════════
   IDLE TICK (gentle sway)
══════════════════════════════ */
let idleT = 0;
function idleTick(){
  if(!spinning){
    idleT += 0.01;
    reels.forEach((r,i)=>{
      r.offset += Math.sin(idleT + i*1.2) * 0.0008;
      r.draw();
    });
  }
  requestAnimationFrame(idleTick);
}

/* ══════════════════════════════
   SPIN
══════════════════════════════ */
function spinAll(){
  if(spinning) return;
  spinning = true;
  tries++;
  document.getElementById('tries').textContent = tries;
  document.getElementById('spinBtn').disabled = true;

  // clear result
  const rt = document.getElementById('resultText');
  rt.classList.remove('show');
  rt.className = 'result-text';
  reels.forEach(r=>{ r.wrap.className='reel-wrap'; });

  // decide outcome
  const isJackpot = tries === 10 || Math.random() < 0.025;

  // ── Decide final symbols ──
  const finalSyms = [];
  if(isJackpot){
    const sym = SYMBOLS[0]; // 🎓
    finalSyms.push(sym, sym, sym);
  } else {
    for(let i=0;i<3;i++) finalSyms.push(randSym());
    // 25% chance: force a pair (random pair position)
    if(Math.random() < 0.25){
      const pair = Math.floor(Math.random()*3); // 0=first+second, 1=second+third, 2=first+third
      if(pair===0)      finalSyms[1] = finalSyms[0];
      else if(pair===1) finalSyms[2] = finalSyms[1];
      else              finalSyms[2] = finalSyms[0];
    }
  }

  // ── Each reel gets its own DEDICATED landing position ──
  // targetOffset must be a whole number so the reel snaps exactly to that symbol.
  // We compute landPos AFTER flooring startOffset so there's no Math.ceil ambiguity.
  const stopTimes = [2200, 2900, 3600];

  reels.forEach((r, i) => {
    // Always land on position 0 of the strip so targetOffset is always
    // an exact multiple of STRIP_LEN — zero ambiguity about which symbol
    // is at the center when the reel stops.
    r.strip[1] = finalSyms[i]; // index 1 is centered when offset is exact multiple of STRIP_LEN
    r.finalSym = finalSyms[i];

    // Round current offset UP to next multiple of STRIP_LEN, then add more full rotations
    const fullRots = (8 + i*3 + Math.floor(Math.random()*4));
    const currentBase = Math.ceil(r.offset / STRIP_LEN);
    const targetOffset = (currentBase + fullRots) * STRIP_LEN; // always exact multiple

    r.spinning = true;

    animateReel(r, r.offset, targetOffset, stopTimes[i], ()=>{
      r.spinning = false;
      r.offset = targetOffset; // exact multiple of STRIP_LEN → index 0 is centered
      r.draw();

      spawnCoin(i);

      if(i === 2){
        const actualSyms = reels.map(r => r.finalSym);
        setTimeout(()=>onAllStopped(actualSyms, isJackpot), 100);
      }
    });
  });
}

function animateReel(r, from, to, duration, onDone){
  const t0 = performance.now();

  // acceleration then deceleration
  function easeInOutBack(t){
    const c1=1.2, c3=c1+1;
    if(t<.5) return (Math.pow(2*t,2)*((c3)*2*t-c1))/2;
    return (Math.pow(2*t-2,2)*((c3)*(2*t-2)+c1)+2)/2;
  }
  function easeOutQuint(t){ return 1-Math.pow(1-t,5); }

  function tick(now){
    const elapsed = now - t0;
    const t = Math.min(elapsed/duration, 1);

    // fast spin early, easeOut to stop
    let ease;
    if(t < 0.15){
      ease = t/0.15 * 0.15; // quick ramp up
    } else {
      ease = 0.15 + (1-0.15) * easeOutQuint((t-0.15)/0.85);
    }

    r.offset = from + (to-from)*ease;
    r.draw();

    if(t<1){ requestAnimationFrame(tick); }
    else { onDone(); }
  }
  requestAnimationFrame(tick);
}

/* ══════════════════════════════
   WIN EVALUATION
══════════════════════════════ */
function onAllStopped(syms, isJackpot){
  spinning = false;
  document.getElementById('spinBtn').disabled = false;

  const s0 = syms[0].e, s1 = syms[1].e, s2 = syms[2].e;
  const allMatch  = s0===s1 && s1===s2;
  const twoMatch  = s0===s1 || s1===s2 || s0===s2;

  const rt = document.getElementById('resultText');

  if(isJackpot || allMatch){
    jackpots++;
    wins++;
    document.getElementById('jackpots').textContent = jackpots;
    document.getElementById('wins').textContent = wins;

    reels.forEach(r=>r.wrap.classList.add('jackpot-glow'));
    rt.textContent = (isJackpot && s0===s1 && s1===s2)
      ? '🎉 110 E LODE! Champagne per tutti! 🎉'
      : `🏆 JACKPOT! Tre uguali — offri ${bet*3} bicchieri!`;
    rt.className = 'result-text jackpot-text show';
    showWinBanner(isJackpot ? '🎓 110 E LODE! 🎓' : `🏆 JACKPOT!`);
    launchConfetti(120);

  } else if(twoMatch){
    wins++;
    document.getElementById('wins').textContent = wins;

    // Highlight winning reels for all pair combinations
    if(syms[0].e===syms[1].e){ reels[0].wrap.classList.add('win-glow'); reels[1].wrap.classList.add('win-glow'); }
    if(syms[1].e===syms[2].e){ reels[1].wrap.classList.add('win-glow'); reels[2].wrap.classList.add('win-glow'); }
    if(syms[0].e===syms[2].e){ reels[0].wrap.classList.add('win-glow'); reels[2].wrap.classList.add('win-glow'); }
    rt.textContent = `✓ Due ${twoMatch?'uguali':'simboli'}! Bevi ${bet} bicchier${bet>1?'i':'e'}!`;
    rt.className = 'result-text show';
    launchConfetti(30);

  } else {
    const loseMsgs = [
      `Niente. Bevi ${bet} sorso${bet>1?'i':''} e riprova.`,
      'Tipo… niente. Bevi.',
      `${bet} sorso${bet>1?'i':''} di consolazione.`,
      'Macché. Un giro di vino.',
      'L\'Oracolo dice: riprova.',
      'Diritto si è vendicato. Bevi.',
    ];
    rt.textContent = loseMsgs[Math.floor(Math.random()*loseMsgs.length)];
    rt.className = 'result-text show';
  }
}

/* ══════════════════════════════
   FX
══════════════════════════════ */
function showWinBanner(text){
  const overlay = document.getElementById('winOverlay');
  const banner  = document.getElementById('winBanner');
  banner.textContent = text;
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), 2200);
}

function spawnCoin(reelIdx){
  const wrap = document.getElementById('wrap'+reelIdx);
  const rect = wrap.getBoundingClientRect();
  const coin = document.createElement('div');
  coin.className = 'coin';
  coin.textContent = '🪙';
  coin.style.cssText = `left:${rect.left+rect.width/2-14}px;top:${rect.top+rect.height/2}px;animation-duration:${0.7+Math.random()*0.4}s;`;
  document.body.appendChild(coin);
  setTimeout(()=>coin.remove(), 1200);
}

function launchConfetti(n){
  const colors = ['#C9973A','#E8C97A','#8B2020','#ffd700','#ffffff','#2D5A3D'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'confetti-p';
      const size = 5+Math.random()*9;
      el.style.cssText = `
        left:${Math.random()*100}vw; top:-10px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.4?'50%':'2px'};
        animation-duration:${1.2+Math.random()*2}s;
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 3500);
    }, i*18);
  }
}

/* ══════════════════════════════
   BET
══════════════════════════════ */
function setBet(btn, val){
  bet = val;
  document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ══════════════════════════════
   RESIZE
══════════════════════════════ */
window.addEventListener('resize', ()=>{
  reels.forEach(r=>r.resize());
});

init();
</script>
