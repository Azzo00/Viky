<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Oracolo del Mercato — Rana Laurea</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F5F0E8;--brown:#3D2B1F;--gold:#C9973A;--gold-light:#E8C97A;--red:#8B2020;--green:#2D5A3D;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--brown);color:var(--cream);font-family:'Courier Prime',monospace;min-height:100vh;display:flex;flex-direction:column;}
  .game-header{background:rgba(0,0,0,0.3);border-bottom:3px double var(--gold);padding:16px 24px;display:flex;align-items:center;gap:16px;}
  .back-btn{font-family:'Special Elite',cursive;font-size:11px;letter-spacing:2px;padding:7px 16px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;text-decoration:none;text-transform:uppercase;transition:all .2s;}
  .back-btn:hover{background:var(--gold);color:var(--brown);}
  .game-header-title{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:var(--gold);flex:1;text-align:center;}
  .game-header-num{font-family:'Special Elite',cursive;font-size:10px;letter-spacing:3px;color:rgba(201,151,58,0.5);text-transform:uppercase;}
  .game-body{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
  .oracle-box{border:3px solid var(--gold);padding:44px 36px;max-width:560px;width:100%;text-align:center;position:relative;}
  .oracle-box::before,.oracle-box::after{content:'✦ ✦ ✦';display:block;color:var(--gold);font-size:13px;letter-spacing:8px;margin:0 0 18px;}
  .oracle-box::after{margin:18px 0 0;content:'✦ ✦ ✦';}
  .ball{font-size:88px;display:block;cursor:pointer;transition:transform .3s;margin:0 auto 20px;line-height:1;}
  .ball:hover{transform:rotate(15deg) scale(1.08);}
  .oracle-title{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold);font-style:italic;margin-bottom:24px;}
  .oracle-input{font-family:'Courier Prime',monospace;font-size:14px;padding:12px 16px;border:2px solid var(--gold);background:rgba(201,151,58,0.06);color:var(--cream);width:100%;max-width:400px;margin-bottom:14px;text-align:center;}
  .oracle-input::placeholder{color:rgba(201,151,58,0.35);}
  .ask-btn{font-family:'Special Elite',cursive;font-size:14px;letter-spacing:3px;padding:13px 36px;background:var(--gold);color:var(--brown);border:none;cursor:pointer;text-transform:uppercase;font-weight:700;box-shadow:4px 4px 0 rgba(0,0,0,0.4);transition:all .15s;}
  .ask-btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,0.4);}
  .oracle-resp{margin-top:28px;min-height:64px;font-family:'Playfair Display',serif;font-size:22px;color:var(--gold-light);font-style:italic;line-height:1.4;transition:opacity .5s;}
  .warning{font-family:'Special Elite',cursive;font-size:10px;color:rgba(201,151,58,0.4);letter-spacing:2px;margin-top:16px;text-transform:uppercase;}
  .history{max-width:560px;width:100%;margin-top:24px;}
  .history-item{border:1px solid rgba(201,151,58,0.2);padding:12px 16px;margin-bottom:8px;text-align:left;}
  .history-q{font-size:11px;color:rgba(201,151,58,0.6);font-family:'Special Elite',cursive;letter-spacing:1px;margin-bottom:4px;}
  .history-a{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--gold-light);}
</style>
</head>
<body>
<header class="game-header">
  <a class="back-btn" href="../index.html">← Torna</a>
  <div><div class="game-header-num">Gioco V di VII</div><div class="game-header-title">Oracolo del Mercato</div></div>
  <div style="width:80px"></div>
</header>
<main class="game-body" style="flex-direction:column;">
  <div class="oracle-box">
    <span class="ball" id="ball" onclick="shake()">🔮</span>
    <div class="oracle-title">L'Oracolo di Rue de la Loi</div>
    <input class="oracle-input" type="text" id="q" placeholder="Es: Diventerò CEO entro i 30?">
    <br>
    <button class="ask-btn" onclick="ask()">✦ Consulta l'Oracolo ✦</button>
    <div class="oracle-resp" id="resp"></div>
    <div class="warning">⚠ Risposta negativa = bevi &nbsp;◆&nbsp; L'oracolo non mente mai</div>
  </div>
  <div class="history" id="history"></div>
</main>
<script>
const A=[
  'I mercati dicono di sì. Brinda alla tua fortuna.',
  'Assolutamente no. Bevi per dimenticarlo.',
  'Tipo... sì? Tipo, forse. Bevi nel dubbio.',
  'Le stelle non sono allineate. Bevi.',
  'Sì, ma solo se smetti di fare lo screen di tutto.',
  'Negativo. Il Diritto si è vendicato. Bevi.',
  'Certo! A patto che i font siano corretti.',
  'Impossibile. Hai 600 pagine di appunti da studiare prima.',
  'Sì. Ma inizia adesso, non tra due settimane.',
  'Il mercato è volatile. Bevi e riprova domani.',
  'Victoria approva: sì!',
  'No. Però almeno l\'Erasmus è stato memorabile. Bevi.',
  'Forse — nel dubbio, bevi.',
  'Altamente improbabile. Hai i piedi freddi, non i piedi per terra.',
  'SÌ! L\'Oracolo è entusiasta. Champagne!',
  'Negativo. Airdroppa i tuoi sogni altrove.',
  'Solo se il font è Calibri 11pt esatto.',
  'Bruxelles ha già risposto a questa domanda. Bevi.',
];
function shake(){
  const b=document.getElementById('ball');
  b.style.transform='rotate(25deg) scale(1.1)';
  setTimeout(()=>b.style.transform='rotate(-15deg)',200);
  setTimeout(()=>b.style.transform='rotate(8deg)',400);
  setTimeout(()=>b.style.transform='',600);
}
function ask(){
  const q=document.getElementById('q').value.trim();
  const r=document.getElementById('resp');
  if(!q){r.textContent='Fai una domanda prima, Rana.';return;}
  shake();
  r.style.opacity='0';
  const ans=A[Math.floor(Math.random()*A.length)];
  setTimeout(()=>{r.textContent=ans;r.style.opacity='1';addHistory(q,ans);},900);
  document.getElementById('q').value='';
}
function addHistory(q,a){
  const h=document.getElementById('history');
  const d=document.createElement('div');
  d.className='history-item';
  d.innerHTML=`<div class="history-q">${q}</div><div class="history-a">${a}</div>`;
  h.insertBefore(d,h.firstChild);
}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
</script>
</body>
</html>
